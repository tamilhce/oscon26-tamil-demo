services:
  opensearch:
    build: .
    image: opensearch-tamil:3.6.0
    container_name: opensearch-tamil-demo
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./config/tamil_stop.txt:/usr/share/opensearch/config/analysis/tamil_stop.txt
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 30

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.0.0
    container_name: opensearch-dashboards-demo
    environment:
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
    ports:
      - 5601:5601
    networks:
      - opensearch-net
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch-data:

networks:
  opensearch-net:
